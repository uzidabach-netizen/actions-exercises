name: Hello World

on:
  push:
    branches:
      - main

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello
        run: echo "Hello from GitHub Actions!"

      - name: Show Date
        run: date

      - name: Show OS Info
        run: cat /etc/os-release

      - name: Multi-line Script
        run: |
          echo "Step 1: Starting..."
          echo "Step 2: Working..."
          echo "Step 3: Done!"
